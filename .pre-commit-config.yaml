repos:
  # 1. Standard quality of life checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace      # Trims trailing whitespace
      - id: end-of-file-fixer        # Ensures files end with a newline
      - id: check-yaml               # Validates YAML syntax
        exclude: pnpm-lock.yaml
      - id: check-json               # Validates JSON syntax
      - id: check-added-large-files  # Prevents accidentally committing huge files

  # 2. REUSE Compliance Hook
  - repo: https://github.com/fsfe/reuse-tool
    rev: v5.0.2
    hooks:
      - id: reuse-lint-file          # Fast linter: only checks files you actually modified
