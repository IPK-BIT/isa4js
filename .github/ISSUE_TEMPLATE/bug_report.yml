name: "🐛 Bug Report"
description: File a structured bug report or incorrect ISA-Tab conversion behavior
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us investigate and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what is going wrong...
    validations:
      required: true

  - type: textarea
    id: isa-json-payload
    attributes:
      label: Input ISA-JSON Snippet
      description: Please provide a minimal, sanitized snippet of the ISA-JSON payload that triggers this issue.
      placeholder: |
        {
          "materials": { ... },
          "processSequence": [ ... ]
        }
      render: json
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs. Actual Behavior
      description: What did you expect to happen, and what actually happened to the generated TSV?
      placeholder: |
        Expected: A "Source Name" header is generated with characteristics.
        Actual: Headers are misaligned.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions on how we can replicate this issue locally.
      value: |
        1. Pass the provided ISA-JSON snippet to `convertTable()`.
        2. Inspect the returned TSV string.
        3. Notice that...
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Runtime Environment
      description: What environment are you running this library in?
      options:
        - Node.js (ESM)
        - Node.js (CommonJS)
        - Browser (Vite / Webpack)
        - Other / Cloud Worker
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Library & Tooling Versions
      description: What versions of the library, Node, and package manager are you using?
      placeholder: "e.g., library: v1.0.0, Node: v20.11.0, pnpm: v9.0.0"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Preliminary Checks
      options:
        - label: I have searched existing issues to make sure this bug hasn't been reported yet.
          required: true
        - label: I have verified that this issue is reproducible with the latest version of the library.
          required: true